$kind: http-request
url: http://127.0.0.1:8000/api/v1/articles
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer YOUR_TOKEN_HERE
body:
  type: text
  content: |-
    {
      "title": "New Article Title",
      "slug": "new-article-slug",
      "body_markdown": "## Overview\nArticle content here.",
      "status": "draft"
    }
order: 4000
